[dev]
  framework = "vite"
  port = 8888
  targetPort = 8888
  command = "npm run dev"
  publish = "dist"
  autoLaunch = false

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Redirect API requests to serverless functions with CORS headers
# This is the primary way we handle CORS in this application
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true
  # Use wildcard origin to allow both production and development environments
  headers = {Access-Control-Allow-Origin = "*", Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS", Access-Control-Allow-Headers = "Content-Type, Authorization, Accept, Cache-Control, Pragma", Access-Control-Allow-Credentials = "true", Access-Control-Max-Age = "86400"}

# Add headers for direct function access
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization, Accept, Cache-Control, Pragma"
    Access-Control-Allow-Credentials = "true"
    Access-Control-Max-Age = "86400"
